<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080808"/>
<title>Soul Fitness · Check In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Syncopate:wght@700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080808;min-height:100vh}
body{font-family:'DM Sans',sans-serif;color:#fff}
.hero{
  background-image:linear-gradient(rgba(8,8,8,0.72),rgba(8,8,8,0.88)),url("Soulbackground.jpg");
  background-size:cover;background-position:center top;
  padding:30px 28px 22px;text-align:center;display:flex;flex-direction:column;align-items:center;
  border-bottom:1px solid #1a1a1a;
}
.hero-circle{width:70px;height:70px;border-radius:50%;border:2px solid #8cc63e;background:#111;overflow:hidden;margin-bottom:12px;display:flex;align-items:center;justify-content:center}
.hero-circle img{width:100%;height:100%;object-fit:cover}
.hero-name{font-family:'Syncopate',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.18em;color:#fff;margin-bottom:5px}
.hero-badge{font-size:9px;letter-spacing:0.18em;color:#8cc63e;background:#16280d;border:1px solid #3f6b1e;border-radius:0;padding:4px 14px}
.wrap{max-width:520px;margin:0 auto;padding:22px 16px 60px}
.date{font-size:10px;letter-spacing:0.16em;color:#666;font-weight:600;margin-bottom:16px;text-align:center}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;color:#fff;margin-bottom:14px}
.cls{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:0;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;transition:border-color .15s}
.cls:active{border-color:#8cc63e}
.cls-time{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.05em;color:#fff;line-height:1}
.cls-name{font-size:10px;letter-spacing:0.1em;color:#8cc63e;font-weight:600;margin-top:4px;text-transform:uppercase}
.cls-count{font-size:11px;letter-spacing:0.06em;color:#777;text-align:right;white-space:nowrap}
.cls-count b{color:#4aaa66;font-weight:700}
.chev{color:#444;font-size:22px;margin-left:4px}
.back{display:inline-flex;align-items:center;gap:8px;background:none;border:none;color:#8cc63e;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.14em;font-weight:600;cursor:pointer;padding:0;margin-bottom:16px}
.rhdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.rhdr-time{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:0.06em;color:#fff}
.rhdr-name{font-size:10px;letter-spacing:0.1em;color:#8cc63e;font-weight:600;text-transform:uppercase}
.rhdr-count{font-size:11px;letter-spacing:0.06em;color:#777}
.rhdr-count b{color:#4aaa66}
.mrow{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:0;padding:15px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;transition:all .12s}
.mrow.on{background:#12220a;border-color:#3f6b1e}
.mname{font-size:15px;letter-spacing:0.03em;color:#eee;font-weight:500}
.mrow.on .mname{color:#fff}
.tick{width:30px;height:30px;border-radius:50%;border:2px solid #333;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Bebas Neue',sans-serif;font-size:18px;color:transparent;transition:all .12s}
.mrow.on .tick{background:#8cc63e;border-color:#8cc63e;color:#0a0a0a}
.empty{text-align:center;color:#555;font-size:13px;letter-spacing:0.04em;padding:40px 0;line-height:1.7}
.refresh{width:100%;background:transparent;border:1px solid #2a2a2a;color:#888;font-family:'DM Sans',sans-serif;font-size:11px;letter-spacing:0.16em;font-weight:600;padding:13px;border-radius:0;cursor:pointer;margin-top:18px}
</style>
</head>
<body>
<div id="root"><div class="empty" style="padding-top:120px">Loading today's classes…</div></div>
<script>
const SB_URL = "https://tqidngxpbzkzdekhizyp.supabase.co";
const SB_KEY = "sb_publishable_UTl_mZYy0xvuOUhNNOM6Mg_s6XOZlto";
const SB_HDR = {"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":"return=minimal"};
async function sbGet(t,q=""){try{const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{headers:SB_HDR});return r.ok?await r.json():[];}catch{return[];}}
async function sbPatch(t,q,d){try{const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{method:"PATCH",headers:SB_HDR,body:JSON.stringify(d)});return r.ok;}catch{return false;}}

const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function todayLabel(){const d=new Date();return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;}
function fmt12(t){const [h,m]=t.split(":").map(Number);const ap=h<12?"am":"pm";const hh=h%12||12;return `${hh}:${String(m).padStart(2,"0")}${ap}`;}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

const root=document.getElementById("root");
let all=[];        // all of today's bookings
let view="classes";
let curTime=null;

function heroHtml(){
  return `<div class="hero">
    <div class="hero-circle"><img src="loginprofile.jpg" onerror="this.style.display='none'" alt="Soul Fitness"/></div>
    <div class="hero-name">SOUL FITNESS</div>
    <div class="hero-badge">CLASS CHECK IN</div>
  </div>`;
}

async function loadAll(){
  all = await sbGet("bookings",`date_key=eq.${todayKey()}&select=id,name,time,session_type,checked_in&order=time.asc`);
  if(view==="roster"&&curTime) renderRoster(curTime); else renderClasses();
}

function timesList(){
  const map={};
  all.forEach(b=>{ (map[b.time]=map[b.time]||[]).push(b); });
  return Object.keys(map).sort().map(t=>({time:t, list:map[t]}));
}

function renderClasses(){
  view="classes"; curTime=null;
  const groups=timesList();
  const body = groups.length
    ? groups.map(g=>{
        const inCount=g.list.filter(b=>b.checked_in).length;
        const type=g.list[0].session_type||"";
        return `<div class="cls" onclick="openRoster('${g.time}')">
          <div>
            <div class="cls-time">${fmt12(g.time)}</div>
            ${type?`<div class="cls-name">${esc(type)}</div>`:""}
          </div>
          <div style="display:flex;align-items:center">
            <div class="cls-count"><b>${inCount}</b> in · ${g.list.length} booked</div>
            <div class="chev">›</div>
          </div>
        </div>`;
      }).join("")
    : `<div class="empty">No classes booked for today yet.</div>`;
  root.innerHTML = heroHtml() + `<div class="wrap">
    <div class="date">${todayLabel().toUpperCase()}</div>
    <div class="sec-title">TODAY'S CLASSES</div>
    ${body}
    <button class="refresh" onclick="loadAll()">↻ REFRESH</button>
  </div>`;
}

function openRoster(t){ curTime=t; renderRoster(t); }

function renderRoster(t){
  view="roster"; curTime=t;
  const list=all.filter(b=>b.time===t).sort((a,b)=>(a.name||"").localeCompare(b.name||""));
  const type=list[0]?list[0].session_type||"":"";
  const inCount=list.filter(b=>b.checked_in).length;
  const rows=list.map(b=>`
    <div class="mrow ${b.checked_in?"on":""}" data-id="${b.id}" onclick="toggle(${b.id})">
      <div class="mname">${esc(b.name||"—")}</div>
      <div class="tick">✓</div>
    </div>`).join("");
  root.innerHTML = heroHtml() + `<div class="wrap">
    <button class="back" onclick="renderClasses()">‹ ALL CLASSES</button>
    <div class="rhdr">
      <div>
        <div class="rhdr-time">${fmt12(t)}</div>
        ${type?`<div class="rhdr-name">${esc(type)}</div>`:""}
      </div>
      <div class="rhdr-count"><b>${inCount}</b> / ${list.length} checked in</div>
    </div>
    ${rows||`<div class="empty">No one booked into this class.</div>`}
    <button class="refresh" onclick="loadAll()">↻ REFRESH</button>
  </div>`;
}

async function toggle(id){
  const b=all.find(x=>x.id===id); if(!b)return;
  const nv=!b.checked_in;
  b.checked_in=nv;                 // optimistic
  renderRoster(curTime);
  const ok=await sbPatch("bookings",`id=eq.${id}`,{checked_in:nv});
  if(!ok){ b.checked_in=!nv; renderRoster(curTime); }
}

window.openRoster=openRoster;
window.renderClasses=renderClasses;
window.renderRoster=renderRoster;
window.toggle=toggle;
window.loadAll=loadAll;

loadAll();
</script>
</body>
</html>
