<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080808"/>
<title>Soul Fitness · Check In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Syncopate:wght@700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:#080808;min-height:100vh}
body{font-family:'DM Sans',sans-serif;color:#fff}
.hero{
  background-image:linear-gradient(rgba(8,8,8,0.72),rgba(8,8,8,0.88)),url("Soulbackground.jpg");
  background-size:cover;background-position:center top;
  padding:36px 28px 26px;text-align:center;display:flex;flex-direction:column;align-items:center;
  border-bottom:1px solid #1a1a1a;
}
.hero-circle{width:82px;height:82px;border-radius:50%;border:2px solid #8cc63e;background:#111;overflow:hidden;margin-bottom:14px;display:flex;align-items:center;justify-content:center}
.hero-circle img{width:100%;height:100%;object-fit:cover}
.hero-name{font-family:'Syncopate',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.18em;color:#fff;margin-bottom:5px}
.hero-tag{font-family:'Syncopate',sans-serif;font-size:6px;font-weight:700;letter-spacing:0.2em;color:#555;margin-bottom:14px}
.hero-badge{font-size:9px;letter-spacing:0.18em;color:#8cc63e;background:#16280d;border:1px solid #3f6b1e;border-radius:0;padding:4px 14px}
.wrap{max-width:460px;margin:0 auto;padding:30px 20px 60px}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:0.12em;color:#fff;margin-bottom:6px}
.form-sub{font-size:11px;letter-spacing:0.1em;color:#777;font-weight:500;margin-bottom:28px;line-height:1.6}
.fl{display:block;font-size:10px;letter-spacing:0.16em;color:#bbb;font-weight:600;margin-bottom:8px}
.fi{width:100%;background:#0e0e0e;border:1px solid #2a2a2a;color:#fff;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:300;padding:14px 15px;outline:none;border-radius:0;-webkit-appearance:none;margin-bottom:14px}
.fi:focus{border-color:#8cc63e}
.fi::placeholder{color:#333}
.btn{width:100%;background:#8cc63e;color:#0a0a0a;border:none;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.16em;padding:18px;cursor:pointer;border-radius:0;transition:background .15s}
.btn:disabled{background:#1a1a1a;color:#444;cursor:not-allowed}
.btn.secondary{background:transparent;border:1px solid #333;color:#888;font-size:13px;padding:12px;letter-spacing:0.14em;margin-top:14px}
.msg{font-size:12px;letter-spacing:0.04em;margin-top:16px;line-height:1.6;text-align:center}
.msg.err{color:#e06040}
.card{background:#0e0e0e;border:1px solid #1e1e1e;border-radius:0;padding:16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-time{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:0.06em;color:#fff;line-height:1}
.card-name{font-size:10px;letter-spacing:0.1em;color:#8cc63e;font-weight:600;margin-top:4px;text-transform:uppercase}
.card-in{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.12em;color:#4aaa66;white-space:nowrap}
.ci-btn{background:#8cc63e;color:#0a0a0a;border:none;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.12em;padding:12px 20px;cursor:pointer;border-radius:0;white-space:nowrap}
.ci-btn:disabled{background:#1a1a1a;color:#444}
.who{font-size:13px;letter-spacing:0.06em;color:#ccc;margin-bottom:6px;font-weight:600}
.date{font-size:10px;letter-spacing:0.14em;color:#555;margin-bottom:20px}
.done-icon{font-family:'Bebas Neue',sans-serif;font-size:64px;color:#8cc63e;text-align:center;margin-bottom:6px}
.done-title{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:0.1em;text-align:center;margin-bottom:12px}
.done-body{font-size:13px;color:#888;line-height:1.7;text-align:center;font-weight:300}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SB_URL = "https://tqidngxpbzkzdekhizyp.supabase.co";
const SB_KEY = "sb_publishable_UTl_mZYy0xvuOUhNNOM6Mg_s6XOZlto";
const SB_HDR = {"apikey":SB_KEY,"Authorization":`Bearer ${SB_KEY}`,"Content-Type":"application/json","Prefer":"return=minimal"};
async function sbGet(t,q=""){try{const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{headers:SB_HDR});return r.ok?await r.json():[];}catch{return[];}}
async function sbPatch(t,q,d){try{const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{method:"PATCH",headers:SB_HDR,body:JSON.stringify(d)});return r.ok;}catch{return false;}}

const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function todayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function todayLabel(){const d=new Date();return `${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}`;}
function fmt12(t){const [h,m]=t.split(":").map(Number);const ap=h<12?"am":"pm";const hh=h%12||12;return `${hh}:${String(m).padStart(2,"0")}${ap}`;}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

const root=document.getElementById("root");
let bookings=[];   // today's bookings for the entered member
let memberName="";

function heroHtml(){
  return `<div class="hero">
    <div class="hero-circle"><img src="loginprofile.jpg" onerror="this.style.display='none'" alt="Soul Fitness"/></div>
    <div class="hero-name">SOUL FITNESS</div>
    <div class="hero-tag">WHERE COMMUNITY MEETS FITNESS</div>
    <div class="hero-badge">CLASS CHECK IN</div>
  </div>`;
}

function renderStart(prefillErr){
  root.innerHTML = heroHtml() + `<div class="wrap">
    <div class="form-title">Check In</div>
    <div class="form-sub">Enter your email to check in to today's class.<br>${todayLabel()}</div>
    <label class="fl" for="email">EMAIL ADDRESS</label>
    <input class="fi" id="email" type="email" placeholder="your@email.com" autocomplete="email"/>
    <button class="btn" id="find">FIND MY CLASS</button>
    ${prefillErr?`<div class="msg err">${prefillErr}</div>`:""}
  </div>`;
  const input=document.getElementById("email");
  document.getElementById("find").onclick=lookup;
  input.onkeydown=e=>{if(e.key==="Enter")lookup();};
  input.focus();
}

async function lookup(){
  const email=(document.getElementById("email").value||"").toLowerCase().trim();
  if(!email||!/\S+@\S+\.\S+/.test(email)){renderStart("Please enter a valid email address.");return;}
  const btn=document.getElementById("find");btn.disabled=true;btn.textContent="CHECKING...";
  const rows=await sbGet("bookings",`email=eq.${encodeURIComponent(email)}&date_key=eq.${todayKey()}&select=id,name,time,session_type,checked_in&order=time.asc`);
  if(!rows.length){
    renderStart("No booking found for today under that email. Book a class in the app first, or check the spelling.");
    return;
  }
  bookings=rows; memberName=rows[0].name||"";
  renderList();
}

function renderList(){
  const cards=bookings.map(b=>`
    <div class="card" data-id="${b.id}">
      <div>
        <div class="card-time">${fmt12(b.time)}</div>
        ${b.session_type?`<div class="card-name">${esc(b.session_type)}</div>`:""}
      </div>
      ${b.checked_in
        ? `<div class="card-in">CHECKED IN ✓</div>`
        : `<button class="ci-btn" onclick="checkIn(${b.id})">CHECK IN</button>`}
    </div>`).join("");
  root.innerHTML = heroHtml() + `<div class="wrap">
    <div class="who">${esc(memberName||"Your bookings")}</div>
    <div class="date">${todayLabel().toUpperCase()}</div>
    ${cards}
    <button class="btn secondary" onclick="renderStart()">CHECK IN SOMEONE ELSE</button>
  </div>`;
}

async function checkIn(id){
  const card=document.querySelector(`.card[data-id="${id}"]`);
  const btn=card?card.querySelector(".ci-btn"):null;
  if(btn){btn.disabled=true;btn.textContent="...";}
  const ok=await sbPatch("bookings",`id=eq.${id}`,{checked_in:true});
  if(!ok){ if(btn){btn.disabled=false;btn.textContent="TRY AGAIN";} return; }
  const b=bookings.find(x=>x.id===id); if(b)b.checked_in=true;
  const anyLeft=bookings.some(x=>!x.checked_in);
  if(anyLeft){ renderList(); }
  else {
    root.innerHTML = heroHtml() + `<div class="wrap">
      <div class="done-icon">✓</div>
      <div class="done-title">You're In</div>
      <div class="done-body">Thanks ${esc((memberName||"").split(" ")[0]||"")}. You're checked in — enjoy your session.<br>This counts towards your Classes Attended.</div>
      <button class="btn secondary" onclick="renderStart()">CHECK IN SOMEONE ELSE</button>
    </div>`;
  }
}
window.checkIn=checkIn;
window.renderStart=renderStart;
window.renderList=renderList;

renderStart();
</script>
</body>
</html>
